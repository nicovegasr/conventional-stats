name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: error

  test:
    name: BATS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y zsh

      - name: Install BATS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y bats

      - name: Install BATS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core

      - name: Run tests
        run: bats tests/

  test-powershell:
    name: Pester (${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [powershell, pwsh]  # Windows PowerShell 5.1 and PowerShell 7
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester
        shell: ${{ matrix.shell }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $r = Invoke-Pester -Path tests/git-commits.Tests.ps1 -Output Detailed -PassThru
          exit $r.FailedCount
