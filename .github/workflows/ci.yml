name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: error

  test:
    name: BATS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y zsh

      - name: Install BATS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y bats

      - name: Install BATS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core

      - name: Run tests
        run: bats tests/

  test-powershell:
    name: Pester (${{ matrix.ps }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ps: [powershell, pwsh]  # Windows PowerShell 5.1 and PowerShell 7
    steps:
      - uses: actions/checkout@v4

      # `shell:` can't take a matrix expression, so invoke the selected
      # interpreter explicitly from the default shell instead.
      - name: Run Pester
        run: ${{ matrix.ps }} -File tests/run-pester.ps1
